<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ParkSync - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="http://localhost:5001/socket.io/socket.io.js"></script>
  <!-- Global Notification Toast -->
  <div id="global-toast" class="global-toast hidden"></div>

  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body class="dashboard-body">
  
  <div class="dashboard-layout">
    <!-- Universal Glassmorphic Sidebar -->
    <aside class="glass-sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-mark small">P</div>
        <span class="logo-text">ParkSync</span>
      </div>
      
      <!-- Role Switcher (Dev Mode) -->
      <div class="role-switcher-container">
        <label>Dev Mode</label>
        <select id="dev-role-switcher" onchange="switchRole(this.value)">
          <option value="customer">Customer View</option>
          <option value="admin">Admin View</option>
          <option value="guard">Guard View</option>
        </select>
      </div>

      <nav class="sidebar-nav" id="sidebar-menu">
        <!-- Sidebar items injected based on role -->
      </nav>

      <button class="collapse-btn" onclick="document.getElementById('sidebar').classList.toggle('collapsed')">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
      </button>
    </aside>

    <!-- Main Content Shell -->
    <div class="main-wrapper">
      
      <!-- Top Navbar -->
      <header class="glass-topbar">
        <div class="topbar-left">
          <h2 id="view-title">Overview</h2>
        </div>
        
        <div class="topbar-right">
          <div class="role-badge">
            <span class="status-dot"></span>
            <span id="role-display">Role</span>
          </div>
          
          <div class="user-profile">
            <img src="" alt="Avatar" class="avatar">
          </div>
          
          <button class="logout-btn" onclick="logout()">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          </button>
        </div>
      </header>

      <!-- Main Content Area -->
      <main class="content-area grid-pattern" id="main-content">
        <div class="loading-state">
          <p>Initialising secure session...</p>
        </div>
      </main>
    </div>
  </div>

  <!-- Role-specific scripts loaded in order -->
  <script src="js/admin.js"></script>
  <script src="js/customer.js"></script>
  <script src="js/guard.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
